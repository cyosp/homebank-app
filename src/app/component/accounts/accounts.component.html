<table *ngIf="accounts" class="table table-striped accounts">
  <thead>
  <tr>
    <th class="account" i18n="@@accounts-account">Account</th>
    <th class="balance" i18n="@@accounts-balance">Balance</th>
  </tr>
  </thead>
  <tbody>
  <tr *ngFor="let account of displayableAccounts">
    <td class="account">
      <a routerLink="{{account.key}}/operations">
        {{ account.name }}
      </a>
    </td>
    <td class="balance">{{ account.balance | currency:account.currency.iso }}</td>
  </tr>
  </tbody>
</table>
